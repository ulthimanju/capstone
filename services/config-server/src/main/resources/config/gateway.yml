            fQIDAQAB
            -----END PUBLIC KEY-----

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: notebook-service
          uri: lb://notebook-service
          predicates:
            - Path=/api/notebooks/**
        - id: quiz-service
          uri: lb://quiz-service
          predicates:
            - Path=/api/quizzes/**
        - id: flashcard-service
          uri: lb://flashcard-service
          predicates:
            - Path=/api/flashcards/**
        - id: course-service
          uri: lb://course-service
          predicates:
            - Path=/api/courses/**
        - id: assignment-service
          uri: lb://assignment-service
          predicates:
            - Path=/api/assignments/**
        - id: practice-service
          uri: lb://practice-service
          predicates:
            - Path=/api/practice/**
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
        - id: gamification-service
          uri: lb://gamification-service
          predicates:
            - Path=/api/gamification/**
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
