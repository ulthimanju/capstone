server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.cloud.gateway: DEBUG


spring:
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true   # Ensures OPTIONS preflight hits CORS filter even on unmatched routes
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      routes:
        # OAuth2 routes must be listed BEFORE the general auth-service route so
        # the Google callback /api/auth/login/oauth2/code/google is matched first.
        - id: auth-service-oauth2
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/oauth2/**, /api/auth/login/oauth2/code/**
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: notebook-service
          uri: lb://notebook-service
          predicates:
            - Path=/api/notebooks/**
        - id: quiz-service
          uri: lb://quiz-service
          predicates:
            - Path=/api/quizzes/**
        - id: flashcard-service
          uri: lb://flashcard-service
          predicates:
            - Path=/api/flashcards/**
        - id: course-service
          uri: lb://course-service
          predicates:
            - Path=/api/courses/**
        - id: assignment-service
          uri: lb://assignment-service
          predicates:
            - Path=/api/assignments/**
        - id: practice-service
          uri: lb://practice-service
          predicates:
            - Path=/api/practice/**
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
        - id: gamification-service
          uri: lb://gamification-service
          predicates:
            - Path=/api/gamification/**
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
