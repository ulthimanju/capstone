# Dedicated Test Profile for Isolated CI Runs
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  # Mock Redis settings for tests
  data:
    redis:
      host: localhost
      port: 63795 # Dummy port to ensure no connection attempt to live Redis during mock tests

  # Mock Kafka configuration for tests (disable autostart to avoid blocking)
  cloud:
    stream:
      kafka:
        binder:
          auto-create-topics: false
        bindings:
          input:
            consumer:
              auto-startup: false
          output:
            producer:
              auto-startup: false

# Exclude eureka registration in test runs
eureka:
  client:
    enabled: false
