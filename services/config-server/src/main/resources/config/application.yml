# Shared Defaults for all Questly Microservices
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-value: |
            -----BEGIN PUBLIC KEY-----
            MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAr6Nrh9RBO/zU/l5VQ9HR
            3z90fyEkKXdJgTBsaORHVcAdbSPAujM7difYMSjWyB5bhswjv4+TVal3nCsmunzH
            MK5mp8EVEsSeRvOSvPGq9uLBmxObIPBq0vQMFxcUSeB2yb4haNzr4gi26p68y1I3
            vEM4xMlmJPs0oPG4nR079jHsFAV22Y6WUFwOlIeo/uIuVBv92TcCJGUvYTcIQXd0
            zHrSMTLiXNgA+WhvQ5P/3zjdF+h4II2ikjbDL33+5dhJti1fxq+Uw4ZaR7nbxhei
            KCxNAExfUawUnxUemk4tX8dtxj65eFr19KLVWQncKaCdw5y3E2XTBAwY4THGhOX9
            nwIDAQAB
            -----END PUBLIC KEY-----

  # Database Connections Default (Individual service overrides only database name)
  datasource:
    username: postgres
    password: postgrespassword
    driver-class-name: org.postgresql.Driver
    # Spring Boot JPA Default setup
    jpa:
      hibernate:
        ddl-auto: validate
      show-sql: false

  # Redis Default Connection Properties
  data:
    redis:
      host: localhost
      port: 6379

  # Centralized Kafka configuration for all microservices
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

# JWT RS256 Token Configuration Parameters
auth:
  jwt:
    # 2048-bit RSA Private Key base64 string for token signing
    private-key: ${JWT_PRIVATE_KEY}

# Actuator Management Default
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
