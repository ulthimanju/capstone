# Shared Defaults for all Questly Microservices
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  # Database Connections Default (Individual service overrides only database name)
  datasource:
    username: postgres
    password: postgrespassword
    driver-class-name: org.postgresql.Driver
    # Spring Boot JPA Default setup
    jpa:
      hibernate:
        ddl-auto: validate
      show-sql: false

  # Redis Default Connection Properties
  data:
    redis:
      host: localhost
      port: 6379

