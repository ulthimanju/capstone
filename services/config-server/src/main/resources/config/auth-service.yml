server:
  port: 8081

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG


spring:
  main:
    allow-circular-references: true
  datasource:
    url: jdbc:postgresql://localhost:5432/db_auth
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:local-dev-placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:local-dev-placeholder}
            scope: openid, profile, email
            # Must exactly match an Authorized Redirect URI in Google Cloud Console
            # Route through the gateway so the browser never talks directly to auth-service
            redirect-uri: "http://localhost:8080/api/auth/login/oauth2/code/{registrationId}"
            # "none" enables PKCE (no client_secret sent in the token exchange)
            client-authentication-method: none
            client-name: Google
        provider:
          google:
            issuer-uri: https://accounts.google.com

auth:
  jwt:
    access-token-expiry-seconds: 900   # 15 minutes
    refresh-token-expiry-days: 7
  # URL the OAuth2SuccessHandler redirects to after issuing the exchange code.
  # The React SPA reads ?code=... from this page and POSTs it to /api/auth/oauth2/exchange.
  frontend-redirect-url: "http://localhost:5173/login"
